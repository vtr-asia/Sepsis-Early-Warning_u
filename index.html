<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>敗血症早期監控系統 - Sepsis Early Warning Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/fhirclient/build/fhir-client.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Microsoft JhengHei', 'Noto Sans TC', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh; overflow: hidden;
        }

        /* ===== 核心修改：左上角病人資訊看板 (帶藍色邊框) ===== */
        .patient-focus-box {
            background: #ffffff;
            border: 2px solid #4a90e2; /* 藍色邊框 */
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
        }
        .focus-label {
            font-size: 13px;
            color: #4a90e2;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
        }
        .focus-name {
            font-size: 32px; /* 32px 極粗體 */
            font-weight: 900;
            color: #2d3436;
            margin-bottom: 6px;
            line-height: 1.2;
        }
        .focus-id {
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 14px;
            color: #a0aec0; /* 淺灰色 ID */
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ===== OAuth 驗證遮罩 ===== */
        #authOverlay {
            position: fixed;
            inset: 0;
            background: #0a0e1a;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .auth-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
        }
        .auth-spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #4a90e2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== 主系統佈局 ===== */
        .container { display: flex; height: 100vh; }
        .sidebar { 
            width: 400px; 
            background: rgba(255,255,255,0.98); 
            padding: 30px; 
            box-shadow: 5px 0 30px rgba(0,0,0,0.1);
            overflow-y: auto;
        }
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        
        .logo { font-size: 20px; font-weight: bold; color: #d63384; margin-bottom: 25px; text-align: center; }
        
        /* 指標卡片 */
        .metric-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 30px; }
        .metric-card { background: #f8fafc; padding: 20px; border-radius: 15px; text-align: center; }
        .metric-value { font-size: 28px; font-weight: bold; color: #2d3748; }
        .metric-label { font-size: 14px; color: #718096; }
        .metric-high { color: #e53e3e; }

        .qsofa-banner {
            padding: 30px; border-radius: 20px; font-size: 40px; font-weight: bold;
            text-align: center; margin: 20px 0; color: white;
        }
        .bg-danger { background: linear-gradient(135deg, #e53e3e, #f6e05e); }
        .bg-success { background: linear-gradient(135deg, #38a169, #4fd1c5); }

        #authBadge {
            display: none; padding: 10px; border-radius: 8px; background: #ebf8ff;
            color: #3182ce; font-size: 12px; margin-bottom: 20px; align-items: center; gap: 8px;
        }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="auth-card">
            <h2>FHIR Server 認證中</h2>
            <div class="auth-spinner"></div>
            <p id="authMsg">正在建立安全性連線...</p>
        </div>
    </div>

    <div class="container" id="mainApp" style="display:none;">
        <div class="sidebar">
            <div class="logo">Sepsis Early Warning System</div>

            <div class="patient-focus-box">
                <span class="focus-label">CURRENT MONITORING</span>
                <div class="focus-name" id="serverPatientName">載入中...</div>
                <div class="focus-id">
                    <span style="color:#cbd5e0">ID:</span> 
                    <span id="serverPatientId">--------</span>
                </div>
            </div>

            <div id="authBadge">✅ 已連接至官方 FHIR Server</div>

            <button class="btn btn-primary" style="width:100%; padding:15px; background:#4a90e2; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;" onclick="startSim()">
                開始即時監控
            </button>
            
            <div style="margin-top:40px;">
                <h4 style="color:#718096; margin-bottom:15px;">病患生理紀錄</h4>
                <div id="logArea" style="font-size:12px; color:#a0aec0; line-height:2;">
                    等待資料輸入...
                </div>
            </div>
        </div>

        <div class="main">
            <h1 style="color:white; margin-bottom:40px;">即時風險分析儀表板</h1>

            <div style="background:white; border-radius:30px; padding:40px; box-shadow:0 20px 50px rgba(0,0,0,0.2);">
                <div id="qsofaDisplay" class="qsofa-banner bg-success">
                    qSOFA: 0 分 (低風險)
                </div>

                <div class="metric-grid">
                    <div class="metric-card">
                        <div class="metric-value" id="val-temp">36.5</div>
                        <div class="metric-label">體溫 (°C)</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="val-rr">18</div>
                        <div class="metric-label">呼吸頻率 (次/分)</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="val-sbp">120</div>
                        <div class="metric-label">收縮壓 (mmHg)</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="val-lac">1.2</div>
                        <div class="metric-label">乳酸值 (mmol/L)</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let client = null;

        // 初始化 SMART on FHIR
        async function init() {
            try {
                client = await FHIR.oauth2.ready();
                
                // 從 Server 獲取病人資料
                const patient = await client.patient.read();
                const name = patient.name ? patient.name[0].text || (patient.name[0].given.join(' ') + ' ' + patient.name[0].family) : "未知姓名";
                const id = patient.id;

                // 更新左上角大字體區塊
                document.getElementById('serverPatientName').innerText = name;
                document.getElementById('serverPatientId').innerText = id;
                document.getElementById('authBadge').style.display = 'flex';

                // 隱藏遮罩
                document.getElementById('authOverlay').style.display = 'none';
                document.getElementById('mainApp').style.display = 'flex';

            } catch (e) {
                console.error("Auth Error", e);
                // Demo 模式預設值
                document.getElementById('serverPatientName').innerText = "王大明 (Demo)";
                document.getElementById('serverPatientId').innerText = "demo-id-999";
                document.getElementById('authOverlay').style.display = 'none';
                document.getElementById('mainApp').style.display = 'flex';
            }
        }

        // 模擬生理數據更新
        function startSim() {
            setInterval(() => {
                const rr = 22 + Math.floor(Math.random() * 5);
                const sbp = 90 - Math.floor(Math.random() * 5);
                const temp = (38.5 + Math.random()).toFixed(1);
                
                document.getElementById('val-rr').innerText = rr;
                document.getElementById('val-rr').classList.add('metric-high');
                document.getElementById('val-sbp').innerText = sbp;
                document.getElementById
