<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>敗血症早期監控系統 - Sepsis Early Warning Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/fhirclient/build/fhir-client.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Microsoft JhengHei', 'Noto Sans TC', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            height: 100vh; overflow: hidden;
        }

        /* ===== OAuth 驗證遮罩 ===== */
        #authOverlay {
            position: fixed; inset: 0; background: #0a0e1a; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        .spinner-container { text-align: center; }
        .spinner {
            width: 50px; height: 50px; border: 3px solid rgba(118,75,162,0.3);
            border-top: 3px solid #764ba2; border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ===== 主介面佈局 ===== */
        #mainApp { display: none; height: 100vh; flex-direction: column; }
        header {
            padding: 15px 30px; background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
        }
        .patient-info-header { font-size: 1.2rem; font-weight: bold; color: #e2e8f0; }
        .auth-badge {
            display: flex; align-items: center; gap: 8px;
            background: rgba(34, 197, 94, 0.2); color: #4ade80;
            padding: 5px 12px; border-radius: 20px; font-size: 0.85rem;
        }

        .dashboard-container { display: flex; flex: 1; overflow: hidden; padding: 20px; gap: 20px; }
        
        /* 左側列表 */
        .sidebar { width: 300px; display: flex; flex-direction: column; gap: 15px; }
        .patient-card {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.3s;
        }
        .patient-card.active { border-color: #764ba2; background: rgba(118,75,162,0.1); }
        .patient-card:hover { background: rgba(255,255,255,0.1); }

        /* 右側主面板 */
        .main-content { flex: 1; background: rgba(15, 23, 42, 0.5); border-radius: 16px; padding: 25px; overflow-y: auto; }
        .vitals-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .vital-box {
            background: rgba(255,255,255,0.03); padding: 20px; border-radius: 12px;
            text-align: center; border-left: 4px solid #764ba2;
        }
        .vital-box .label { font-size: 0.9rem; color: #94a3b8; margin-bottom: 10px; }
        .vital-box .value { font-size: 2rem; font-weight: bold; color: #fff; }

        .high-risk { border-left-color: #ef4444 !important; background: rgba(239, 68, 68, 0.05) !important; }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="spinner-container" id="spinnerWrap">
            <div class="spinner"></div>
            <p id="authStatusMsg">正在與 EHR 系統進行安全驗證...</p>
        </div>
        <div id="authError" style="display:none; color: #ef4444; text-align: center;">
            <p>❌ 驗證失敗</p>
            <small id="authErrorMsg"></small>
        </div>
    </div>

    <div id="mainApp">
        <header>
            <div class="patient-info-header" id="patientHeader">🎯 正在載入病人資料...</div>
            <div class="auth-badge" id="authBadge">
                <span id="authBadgeText">✅ FHIR 已驗證</span>
            </div>
        </header>

        <div class="dashboard-container">
            <div class="sidebar" id="patientList">
                </div>
            <div class="main-content">
                <h2>生理徵象即時監控</h2>
                <div class="vitals-grid" id="vitalsGrid">
                    <div class="vital-box"><div class="label">體溫</div><div class="value" id="val-temp">--</div></div>
                    <div class="vital-box"><div class="label">呼吸速率</div><div class="value" id="val-rr">--</div></div>
                    <div class="vital-box"><div class="label">收縮壓</div><div class="value" id="val-bp">--</div></div>
                    <div class="vital-box"><div class="label">qSOFA 分數</div><div class="value" id="val-qsofa">--</div></div>
                </div>
                <div id="riskAlert" style="margin-top: 30px; padding: 20px; border-radius: 12px; display: none;"></div>
            </div>
        </div>
    </div>

    <script>
        let fhirClient = null;
        let currentPatient = null;

        // 模擬的預設病人清單
        const localPatients = {};

        // 1. 初始化 SMART App
        window.onload = function() {
            FHIR.oauth2.ready()
                .then(client => {
                    revealApp(client);
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('authStatusMsg').textContent = "請透過 EHR 系統啟動此 App";
                });
        };

        /**
         * [核心] 抓取 EHR 病人資料並顯示
         */
        async function revealApp(client) {
            fhirClient = client;
            
            try {
                // 從伺服器抓取當前病人
                const patientData = await fhirClient.patient.read();
                console.log("FHIR Patient Resource:", patientData);

                // 解析姓名
                const name = patientData.name 
                    ? (patientData.name[0].text || `${patientData.name[0].family || ''}${patientData.name[0].given ? patientData.name[0].given.join('') : ''}`) 
                    : "匿名病人";

                // 解析性別
                const genderMap = { 'male': '男', 'female': '女', 'other': '其他', 'unknown': '未知' };
                const gender = genderMap[patientData.gender] || '未知';

                // 計算年齡
                let age = "未知";
                if (patientData.birthDate) {
                    const birth = new Date(patientData.birthDate);
                    const today = new Date();
                    age = today.getFullYear() - birth.getFullYear();
                    if (today.getMonth() < birth.getMonth() || (today.getMonth() === birth.getMonth() && today.getDate() < birth.getDate())) age--;
                }

                // 更新標題與徽章
                document.getElementById('patientHeader').innerHTML = 
                    `🎯 目前監測：<span style="color:#a855f7">${name}</span> (${gender}, ${age}歲) <small style="color:#64748b; font-size:0.8rem;">[ID: ${patientData.id}]</small>`;
                document.getElementById('authBadgeText').textContent = `✅ 已連接: ${patientData.id}`;

                // 將抓到的資料存入本地物件
                currentPatient = {
                    id: patientData.id,
                    name: name,
                    gender: gender,
                    age: age,
                    vitals: { temp: 37.2, rr: 19, bp: 115, qsofa: 1 } // 預設模擬值
                };
                
                renderDashboard();

            } catch (error) {
                console.error("抓取病人資料失敗:", error);
                document.getElementById('patientHeader').textContent = "⚠️ 無法取得病人資料";
            }

            // 動態切換介面
            const overlay = document.getElementById('authOverlay');
            overlay.style.transition = 'opacity 0.5s ease';
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                document.getElementById('mainApp').style.display = 'flex';
            }, 500);
        }

        function renderDashboard() {
            if (!currentPatient) return;

            // 渲染左側卡片
            const list = document.getElementById('patientList');
            list.innerHTML = `
                <div class="patient-card active">
                    <div style="font-weight:bold">${currentPatient.name}</div>
                    <div style="font-size:0.8rem; color:#94a3b8">ID: ${currentPatient.id}</div>
                </div>
            `;

            // 更新數據板
            document.getElementById('val-temp').textContent = currentPatient.vitals.temp + " °C";
            document.getElementById('val-rr').textContent = currentPatient.vitals.rr + " 次/分";
            document.getElementById('val-bp').textContent = currentPatient.vitals.bp + " mmHg";
            document.getElementById('val-qsofa').textContent = currentPatient.vitals.qsofa + " 分";

            // 風險判斷
            const alertBox = document.getElementById('riskAlert');
            if (currentPatient.vitals.qsofa >= 2) {
                alertBox.style.display = 'block';
                alertBox.style.background = 'rgba(239, 68, 68, 0.2)';
                alertBox.style.color = '#fca5a5';
                alertBox.innerHTML = "<strong>⚠️ 高風險警示：</strong> 檢測到符合敗血症臨床特徵，請立即評估。";
            } else {
                alertBox.style.display = 'block';
                alertBox.style.background = 'rgba(34, 197, 94, 0.1)';
                alertBox.style.color = '#86efac';
                alertBox.innerHTML = "<strong>✅ 狀態穩定：</strong> 目前生理徵象在正常範圍內。";
            }
        }
    </script>
</body>
</html>
